[defaults]
workspace = "default"

[remotes.remote1]
host = "exp-server"
ssh_config = "ssh_config"
ssh_options = []

[workspaces.default]
remote = "remote1"
local_dir = "workspaces/default"
remote_dir = "/data/workspaces/YOUR_NAME/my_project"
rsync_flags = ["-az", "--info=progress2"]
excludes = [
  ".git/",
  ".venv/",
  "__pycache__/",
  "*.pyc",
  "outputs/",
  "output/",
  "logs/",
  "checkpoints/",
  "wandb/",
  "runs/",
  "tmp/",
]
status_commands = []
